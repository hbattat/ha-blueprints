blueprint:
  name: Garage Arrival Prompt (Timer Version)
  description: Logic from version 1 converted into a Blueprint with a visual timer.
  domain: automation
  input:
    target_device:
      name: Device to notify
      selector:
        device:
          integration: mobile_app
    tracker_entity:
      name: Device Tracker
      selector:
        entity:
          domain: device_tracker
    zone_entity:
      name: Zone
      selector:
        entity:
          domain: zone
    cover_entity:
      name: Garage Door
      selector:
        entity:
          domain: cover
    wait_time:
      name: Timeout (Seconds)
      default: 45
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds

mode: restart

variables:
  # This matches the naming convention used in your first working version
  notify_service: "notify.mobile_app_{{ device_attr(target_device, 'name') | lower | replace(' ', '_') | replace('-', '_') }}"
  tag_id: "garage_arrival_timer"

trigger:
  - platform: zone
    entity_id: !input tracker_entity
    zone: !input zone_entity
    event: enter

condition:
  - condition: state
    entity_id: !input cover_entity
    state: "closed"

action:
  # 1. Send the Notification with Chronometer (Visual Timer)
  - service: "{{ notify_service }}"
    data:
      title: "Arriving Home"
      message: "Would you like to open the garage door?"
      data:
        tag: "{{ tag_id }}"
        chronometer: true
        when: "{{ as_timestamp(now()) | int }}"
        actions:
          - action: "OPEN_GARAGE"
            title: "Open Garage"
          - action: "DISMISS"
            title: "Dismiss"

  # 2. Wait for the specific button press OR the timeout
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "OPEN_GARAGE"
    timeout:
      seconds: !input wait_time
    continue_on_timeout: true

  # 3. Check if we should open the door (only if button was pressed)
  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
    then:
      - service: cover.open_cover
        target:
          entity_id: !input cover_entity

  # 4. Cleanup: Dismiss the notification regardless of what happened
  - service: "{{ notify_service }}"
    data:
      message: "clear_notification"
      data:
        tag: "{{ tag_id }}"
