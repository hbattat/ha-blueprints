blueprint:
  name: Universal Actionable Notification (Final Version)
  description: Use this for any trigger (Zone, NFC, Wi-Fi). Reliable and simple.
  domain: automation
  input:
    trigger_condition:
      name: Trigger
      description: Add any trigger here (Zone, State, etc.)
      selector:
        trigger: {}
    dynamic_conditions:
      name: Conditions
      default: []
      selector:
        condition: {}
    notify_service:
      name: Notify Service
      description: Select your phone's notification service (e.g., notify.mobile_app_pixel_7)
      selector:
        action: {}
    notification_title:
      name: Title
      default: "Proximity Alert"
      selector:
        text:
    notification_message:
      name: Message
      default: "Perform action?"
      selector:
        text:
    action_button_label:
      name: Button Label
      default: "Confirm"
      selector:
        text:
    action_to_run:
      name: Action to perform
      selector:
        action: {}
    wait_time:
      name: Timeout (Seconds)
      default: 45
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds

mode: restart

# We use a hardcoded 'universal_click' to ensure the event listener works every time
variables:
  action_key: "UNIVERSAL_CLICK"

trigger: !input trigger_condition

condition: !input dynamic_conditions

action:
  # 1. Send Notification
  - alias: "Send the prompt"
    choose: []
    default: !input notify_service
    # We inject the data needed into your notify service call
    # This works because HA merges the blueprint input with these data fields
    add_config:
      data:
        title: !input notification_title
        message: !input notification_message
        data:
          tag: "zone_request"
          chronometer: true
          when: "{{ as_timestamp(now()) | int }}"
          actions:
            - action: "{{ action_key }}"
              title: !input action_button_label

  # 2. Wait for the click
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ action_key }}"
    timeout:
      seconds: !input wait_time
    continue_on_timeout: true

  # 3. If clicked, run the action
  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
    then:
      - choose: []
        default: !input action_to_run

  # 4. Cleanup
  - alias: "Clear the notification"
    choose: []
    default: !input notify_service
    add_config:
      data:
        message: "clear_notification"
        data:
          tag: "zone_request"
