blueprint:
  name: Universal Zone Prompt (Progress Bar)
  description: "Triggers a notification with a visual progress bar and auto-timeout."
  domain: automation
  input:
    tracker_entity:
      name: Device Tracker
      selector:
        entity:
          domain: device_tracker
    zone_entity:
      name: Zone
      selector:
        entity:
          domain: zone
    notify_device:
      name: Device to notify
      selector:
        device:
          integration: mobile_app
    notification_title:
      name: Title
      default: "Proximity Alert"
      selector:
        text:
    notification_message:
      name: Message
      default: "Action expires shortly."
      selector:
        text:
    action_button_label:
      name: Button Label
      default: "Confirm"
      selector:
        text:
    timer_duration:
      name: Timer Duration (Seconds)
      default: 45
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds
    action_to_run:
      name: Action to perform
      selector:
        action: {}

mode: restart

variables:
  timer_seconds: !input timer_duration

trigger:
  - platform: zone
    entity_id: !input tracker_entity
    zone: !input zone_entity
    event: enter

action:
  # 1. Send the Notification
  - alias: "Send Notification"
    domain: mobile_app
    type: notify
    device_id: !input notify_device
    title: !input notification_title
    message: !input notification_message
    data:
      tag: "zone_prompt"
      # Explicitly disable the timer
      chronometer: false
      show_when: false
      # Visual Bar: max is total time, progress is the 'fill'
      # We set them equal to show a 'full' bar that represents the task duration
      max: !input timer_duration
      progress: !input timer_duration
      # Tell the Android OS to delete the notification after X seconds
      timeout_after: !input timer_duration
      actions:
        - action: "EXECUTE_CLICK"
          title: !input action_button_label
        - action: "DISMISS_CLICK"
          title: "Dismiss"

  # 2. Wait for the button press
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "EXECUTE_CLICK"
    timeout:
      seconds: "{{ timer_seconds }}"
    continue_on_timeout: true

  # 3. Execution Logic
  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
    then:
      - choose: []
        default: !input action_to_run

  # 4. Final Cleanup
  - alias: "Clear Notification"
    domain: mobile_app_notification
    type: notify
    device_id: !input notify_device
    message: "clear_notification"
    data:
      tag: "zone_prompt"
