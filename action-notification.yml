blueprint:
  name: Universal Zone Action Prompt
  description: Trigger a notification with a visual timer and ANY custom action/condition when entering a zone.
  domain: automation
  input:
    target_device:
      name: Device to notify
      selector:
        device:
          integration: mobile_app
    tracker_entity:
      name: Device Tracker
      selector:
        entity:
          domain: device_tracker
    zone_entity:
      name: Zone
      selector:
        entity:
          domain: zone
    extra_conditions:
      name: Conditions (Optional)
      description: Any conditions that must be met to send the notification (e.g., Garage is closed).
      default: []
      selector:
        condition: {}
    notification_title:
      name: Notification Title
      default: "Proximity Alert"
      selector:
        text:
    notification_message:
      name: Notification Message
      default: "Would you like to perform the action?"
      selector:
        text:
    action_button_label:
      name: Button Label
      default: "Confirm"
      selector:
        text:
    action_to_run:
      name: Action to perform
      description: The service(s) to run when the button is pressed.
      selector:
        action: {}
    wait_time:
      name: Timeout (Seconds)
      default: 45
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds

mode: restart

variables:
  # Dynamically generates the notify service for your phone
  notify_service: "notify.mobile_app_{{ device_attr(target_device, 'name') | lower | replace(' ', '_') | replace('-', '_') }}"
  # Unique action key ensures clicks don't interfere with other automations
  unique_action: "{{ 'ZONE_ACTION_' ~ context.id }}"
  tag_id: "zone_arrival_timer"

trigger:
  - platform: zone
    entity_id: !input tracker_entity
    zone: !input zone_entity
    event: enter

# This section now handles your "Garage is Closed" or any other logic
condition: !input extra_conditions

action:
  # 1. Send the Notification with Chronometer (Visual Timer)
  - service: "{{ notify_service }}"
    data:
      title: !input notification_title
      message: !input notification_message
      data:
        tag: "{{ tag_id }}"
        chronometer: true
        when: "{{ as_timestamp(now()) | int }}"
        actions:
          - action: "{{ unique_action }}"
            title: !input action_button_label
          - action: "DISMISS"
            title: "Dismiss"

  # 2. Wait for the specific button press OR the timeout
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ unique_action }}"
    timeout:
      seconds: !input wait_time
    continue_on_timeout: true

  # 3. Check if the button was pressed
  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
    then:
      # This runs WHATEVER arbitrary actions you picked in the UI
      - choose: []
        default: !input action_to_run

  # 4. Cleanup: Dismiss the notification automatically
  - service: "{{ notify_service }}"
    data:
      message: "clear_notification"
      data:
        tag: "{{ tag_id }}"
