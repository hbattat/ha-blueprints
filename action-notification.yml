blueprint:
  name: Universal Pro Actionable Notification (Final Fix)
  description: "Triggers a notification with a timer to multiple devices using robust service calls."
  domain: automation
  input:
    universal_trigger:
      name: Trigger(s)
      selector:
        trigger: {}
    notification_conditions:
      name: Notification Conditions
      default: []
      selector:
        condition: {}
    notify_devices:
      name: Devices to Notify
      description: Select one or more mobile devices.
      selector:
        device:
          integration: mobile_app
          multiple: true
    action_conditions:
      name: Action Conditions
      default: []
      selector:
        condition: {}
    notification_title:
      name: Title
      default: "Action Required"
      selector:
        text:
    notification_message:
      name: Message
      default: "This prompt will auto-dismiss after the timeout."
      selector:
        text:
    action_button_label:
      name: Button Label
      default: "Confirm Action"
      selector:
        text:
    timer_duration:
      name: Timer Duration (Seconds)
      default: 45
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds
    action_to_run:
      name: Action to perform
      selector:
        action: {}

mode: parallel
max: 10

variables:
  # Map the inputs to variables for use in templates
  timer_seconds: !input timer_duration
  unique_action: "{{ 'PRO_ACTION_' ~ context.id }}"
  tag_id: "pro_universal_timer"
  devices: !input notify_devices

trigger: !input universal_trigger

condition: !input notification_conditions

action:
  # 1. Send Notifications to all selected devices
  - repeat:
      for_each: "{{ devices }}"
      sequence:
        - service: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | lower | replace(' ', '_') | replace('-', '_') | replace('\'', '') }}"
          data:
            title: !input notification_title
            message: !input notification_message
            data:
              tag: "{{ tag_id }}"
              chronometer: true
              when: "{{ as_timestamp(now()) | int }}"
              timeout_after: !input timer_duration
              actions:
                - action: "{{ unique_action }}"
                  title: !input action_button_label
                - action: "DISMISS"
                  title: "Dismiss"

  # 2. Wait for ANY device to respond
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ unique_action }}"
    timeout:
      seconds: "{{ timer_seconds }}"
    continue_on_timeout: true

  # 3. Decision Logic
  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
      - condition: !input action_conditions
    then:
      - choose: []
        default: !input action_to_run

  # 4. Final Cleanup: Clear notifications from all devices
  - repeat:
      for_each: "{{ devices }}"
      sequence:
        - service: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | lower | replace(' ', '_') | replace('-', '_') | replace('\'', '') }}"
          data:
            message: "clear_notification"
            data:
              tag: "{{ tag_id }}"
