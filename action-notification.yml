blueprint:
  name: Universal Actionable Notification (Generic Trigger)
  description: A truly universal blueprint where you define the Trigger, the Condition, and the Action.
  domain: automation
  input:
    trigger_condition:
      name: Trigger
      description: What should start this automation? (e.g., Zone, NFC, Wi-Fi SSID).
      selector:
        trigger: {}
    dynamic_conditions:
      name: Conditions (Optional)
      description: Logic that must be true to send the notification.
      default: []
      selector:
        condition: {}
    target_device:
      name: Device to notify
      selector:
        device:
          integration: mobile_app
    notification_title:
      name: Notification Title
      default: "Action Required"
      selector:
        text:
    notification_message:
      name: Notification Message
      default: "Would you like to run the action?"
      selector:
        text:
    action_button_label:
      name: Button Label
      default: "Confirm"
      selector:
        text:
    action_to_run:
      name: Action
      description: The service to run if the button is pressed.
      selector:
        action: {}
    wait_time:
      name: Timeout (Seconds)
      default: 45
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds

mode: restart

variables:
  # Unique ID ensures the button click only talks back to THIS specific trigger instance
  unique_action: "{{ 'GENERIC_ACTION_' ~ context.id }}"
  notify_service: "notify.mobile_app_{{ device_attr(target_device, 'name') | lower | replace(' ', '_') | replace('-', '_') }}"
  tag_id: "universal_action_prompt"

# The trigger is now defined by you in the UI
trigger: !input trigger_condition

# The conditions are now defined by you in the UI
condition: !input dynamic_conditions

action:
  # 1. Send the Notification
  - service: "{{ notify_service }}"
    data:
      title: !input notification_title
      message: !input notification_message
      data:
        tag: "{{ tag_id }}"
        chronometer: true
        when: "{{ as_timestamp(now()) | int }}"
        actions:
          - action: "{{ unique_action }}"
            title: !input action_button_label

  # 2. Wait for the unique button press
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ unique_action }}"
    timeout:
      seconds: !input wait_time
    continue_on_timeout: true

  # 3. Execution Logic
  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
    then:
      - choose: []
        default: !input action_to_run

  # 4. Cleanup
  - service: "{{ notify_service }}"
    data:
      message: "clear_notification"
      data:
        tag: "{{ tag_id }}"
