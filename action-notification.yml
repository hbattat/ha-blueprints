blueprint:
  name: Generic Actionable Zone Notification (Chronometer)
  description: Sends a notification with a live "time elapsed" counter and auto-clears.
  domain: automation
  input:
    target_device:
      name: Device to notify
      selector:
        device:
          integration: mobile_app
    tracker_entity:
      name: Device Tracker
      selector:
        entity:
          domain: device_tracker
    zone_entity:
      name: Zone
      selector:
        entity:
          domain: zone
    notification_title:
      name: Notification Title
      default: "Near Home"
      selector:
        text:
    notification_message:
      name: Notification Message
      default: "Would you like to perform the action?"
      selector:
        text:
    action_button_label:
      name: Button Label
      default: "Run Action"
      selector:
        text:
    action_to_run:
      name: Action
      selector:
        action: {}
    wait_time:
      name: Timeout (Seconds)
      default: 45
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds

mode: restart

variables:
  action_to_run: !input action_to_run
  # Ensures we target the correct mobile app notify service
  notify_service: "notify.mobile_app_{{ device_attr(target_device, 'name') | lower | replace(' ', '_') | replace('-', '_') }}"
  tag_id: "zone_action_timer"

trigger:
  - platform: zone
    entity_id: !input tracker_entity
    zone: !input zone_entity
    event: enter

action:
  # 1. Send the Notification with Chronometer
  - service: "{{ notify_service }}"
    data:
      title: !input notification_title
      message: !input notification_message
      data:
        tag: "{{ tag_id }}"
        chronometer: true # This starts the live timer on Android
        when: "{{ as_timestamp(now()) | int }}" # Sets the "start" time to now
        actions:
          - action: "GENERIC_ACTION_TRIGGERED"
            title: !input action_button_label

  # 2. Wait for the button press OR the timeout
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "GENERIC_ACTION_TRIGGERED"
    timeout:
      seconds: !input wait_time
    continue_on_timeout: true

  # 3. If the button was pressed, run the action
  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
    then:
      - choose: []
        default: !input action_to_run

  # 4. Final Cleanup: Clear the notification from the phone
  - service: "{{ notify_service }}"
    data:
      message: "clear_notification"
      data:
        tag: "{{ tag_id }}"
