blueprint:
  name: "Universal Zone Script-Automation"
  description: "Acts like a script but triggers like an automation."
  domain: automation
  input:
    tracker_entity:
      name: Who to track?
      selector:
        entity:
          domain: device_tracker
    zone_entity:
      name: Which zone?
      selector:
        entity:
          domain: zone
    notify_device:
      name: Device to notify
      selector:
        device:
          integration: mobile_app
    action_to_run:
      name: Action to perform
      selector:
        action: {}

mode: restart

trigger:
  - platform: zone
    entity_id: !input tracker_entity
    zone: !input zone_entity
    event: enter

action:
  # This section behaves exactly like a standalone script
  - alias: "Send Notification"
    domain: mobile_app
    type: notify
    device_id: !input notify_device
    title: "Proximity Alert"
    message: "Run the action?"
    data:
      tag: "zone_prompt"
      chronometer: true
      when: "{{ as_timestamp(now()) | int }}"
      actions:
        - action: "EXECUTE"
          title: "Confirm"

  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "EXECUTE"
    timeout: "00:00:45"

  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
    then:
      - choose: []
        default: !input action_to_run

  - alias: "Dismiss Notification"
    domain: mobile_app
    type: notify
    device_id: !input notify_device
    message: "clear_notification"
    data:
      tag: "zone_prompt"
