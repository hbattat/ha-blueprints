blueprint:
  name: Universal Pro Actionable Notification
  description: "Trigger-agnostic engine. Define triggers and filters in the UI; this handles the logic, timers, and multi-device delivery."
  domain: automation
  input:
    universal_trigger:
      name: Trigger(s)
      description: What starts the automation? (e.g., Zone, Wi-Fi SSID, State change).
      selector:
        trigger: {}
    notification_conditions:
      name: Notification Conditions
      description: Logic required to SEND the notification (e.g., Is Person A entering Zone B? Is the Garage closed?).
      default: []
      selector:
        condition: {}
    notify_devices:
      name: Devices to Notify
      description: One or more mobile devices to receive the prompt.
      selector:
        device:
          integration: mobile_app
          multiple: true
    action_conditions:
      name: Action Conditions
      description: Logic required to RUN the action after the button is pressed.
      default: []
      selector:
        condition: {}
    notification_title:
      name: Title
      default: "Action Required"
      selector:
        text:
    notification_message:
      name: Message
      default: "This prompt will auto-dismiss after the timeout."
      selector:
        text:
    action_button_label:
      name: Button Label
      default: "Confirm Action"
      selector:
        text:
    timer_duration:
      name: Timer Duration (Seconds)
      default: 45
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds
    action_to_run:
      name: Action to perform
      selector:
        action: {}

mode: parallel
max: 10

variables:
  timer_seconds: !input timer_duration
  unique_action: "{{ 'PRO_ACTION_' ~ context.id }}"
  tag_id: "pro_universal_timer"

trigger: !input universal_trigger

# The "Filter": Only send if these conditions (like Zone/Person) match
condition: !input notification_conditions

action:
  # 1. Multi-Device Delivery
  - repeat:
      for_each: !input notify_devices
      sequence:
        - alias: "Send Notification"
          domain: mobile_app
          type: notify
          device_id: "{{ repeat.item }}"
          title: !input notification_title
          message: !input notification_message
          data:
            tag: "{{ tag_id }}"
            chronometer: true
            when: "{{ as_timestamp(now()) | int }}"
            timeout_after: !input timer_duration
            actions:
              - action: "{{ unique_action }}"
                title: !input action_button_label
              - action: "DISMISS"
                title: "Dismiss"

  # 2. Wait for response
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ unique_action }}"
    timeout:
      seconds: "{{ timer_seconds }}"
    continue_on_timeout: true

  # 3. Final Gate and Execution
  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
      - condition: !input action_conditions
    then:
      - choose: []
        default: !input action_to_run

  # 4. Multi-Device Cleanup
  - repeat:
      for_each: !input notify_devices
      sequence:
        - alias: "Clear Notification"
          domain: mobile_app
          type: notify
          device_id: "{{ repeat.item }}"
          message: "clear_notification"
          data:
            tag: "{{ tag_id }}"
