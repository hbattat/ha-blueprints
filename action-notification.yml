blueprint:
  name: Universal Pro Actionable Notification (Safe Variables)
  description: "Triggers a notification with a timer to multiple devices. Fixes the 'Unknown Device' error by pre-calculating service names."
  domain: automation
  input:
    universal_trigger:
      name: Trigger(s)
      selector:
        trigger: {}
    notification_conditions:
      name: Notification Conditions
      default: []
      selector:
        condition: {}
    notify_devices:
      name: Devices to Notify
      description: Select one or more mobile devices.
      selector:
        device:
          integration: mobile_app
          multiple: true
    action_conditions:
      name: Action Conditions
      default: []
      selector:
        condition: {}
    notification_title:
      name: Title
      default: "Action Required"
      selector:
        text:
    notification_message:
      name: Message
      default: "This prompt will auto-dismiss after the timeout."
      selector:
        text:
    action_button_label:
      name: Button Label
      default: "Confirm Action"
      selector:
        text:
    timer_duration:
      name: Timer Duration (Seconds)
      default: 45
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds
    action_to_run:
      name: Action to perform
      selector:
        action: {}

mode: parallel
max: 10

variables:
  # Pre-calculate everything here so the actions don't have to 'guess'
  timer_seconds: !input timer_duration
  unique_action: "{{ 'PRO_ACTION_' ~ context.id }}"
  tag_id: "pro_universal_timer"
  # This creates a clean list of notify service names (e.g., ['notify.mobile_app_pixel_7'])
  notify_services: >
    {% set devices = notify_devices %}
    {% set ns = namespace(services=[]) %}
    {% for device in devices %}
      {% set name = device_attr(device, 'name') | lower | replace(' ', '_') | replace('-', '_') | replace('\'', '') %}
      {% set ns.services = ns.services + [ 'notify.mobile_app_' ~ name ] %}
    {% endfor %}
    {{ ns.services }}

trigger: !input universal_trigger

condition: !input notification_conditions

action:
  # 1. Send Notifications to all pre-calculated services
  - repeat:
      for_each: "{{ notify_services }}"
      sequence:
        - service: "{{ repeat.item }}"
          data:
            title: !input notification_title
            message: !input notification_message
            data:
              tag: "{{ tag_id }}"
              chronometer: true
              when: "{{ as_timestamp(now()) | int }}"
              timeout_after: !input timer_duration
              actions:
                - action: "{{ unique_action }}"
                  title: !input action_button_label
                - action: "DISMISS"
                  title: "Dismiss"

  # 2. Wait for ANY device to respond
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ unique_action }}"
    timeout:
      seconds: "{{ timer_seconds }}"
    continue_on_timeout: true

  # 3. Decision Logic
  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
      - condition: !input action_conditions
    then:
      - choose: []
        default: !input action_to_run

  # 4. Final Cleanup
  - repeat:
      for_each: "{{ notify_services }}"
      sequence:
        - service: "{{ repeat.item }}"
          data:
            message: "clear_notification"
            data:
              tag: "{{ tag_id }}"
