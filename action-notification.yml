blueprint:
  name: Pro Universal Zone Actionable Notification
  description: "Track multiple devices, notify multiple devices, and use dual-layer conditions."
  domain: automation
  input:
    tracker_entities:
      name: Devices to Track
      description: One or more device trackers or persons to monitor.
      selector:
        entity:
          domain: device_tracker
          multiple: true
    zone_entity:
      name: Zone
      selector:
        entity:
          domain: zone
    zone_event:
      name: Zone Event
      default: enter
      selector:
        select:
          options:
            - label: "Entering Zone"
              value: enter
            - label: "Leaving Zone"
              value: leave
    notify_devices:
      name: Devices to Notify
      description: Select one or more mobile devices to receive the prompt.
      selector:
        device:
          integration: mobile_app
          multiple: true
    notification_conditions:
      name: Notification Conditions
      description: Conditions required to SEND the notification (e.g., Is the Garage closed?).
      default: []
      selector:
        condition: {}
    action_conditions:
      name: Action Conditions
      description: Conditions required to RUN the action after the button is pressed.
      default: []
      selector:
        condition: {}
    notification_title:
      name: Title
      default: "Zone Alert"
      selector:
        text:
    notification_message:
      name: Message
      default: "This prompt will auto-dismiss after the timeout."
      selector:
        text:
    action_button_label:
      name: Button Label
      default: "Confirm Action"
      selector:
        text:
    timer_duration:
      name: Timer Duration (Seconds)
      default: 45
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds
    action_to_run:
      name: Action to perform
      selector:
        action: {}

mode: parallel # Allows multiple family members to trigger this at once
max: 10

variables:
  timer_seconds: !input timer_duration
  # Generate a unique action key for this specific run
  unique_action: "{{ 'PRO_ACTION_' ~ context.id }}"
  tag_id: "pro_zone_timer"

trigger:
  - platform: zone
    entity_id: !input tracker_entities
    zone: !input zone_entity
    event: !input zone_event

# 1. Gatekeeper: Should we even send the notification?
condition: !input notification_conditions

action:
  # 1. Send Notifications to all selected devices
  - repeat:
      for_each: !input notify_devices
      sequence:
        - alias: "Send Notification to Device"
          domain: mobile_app
          type: notify
          device_id: "{{ repeat.item }}"
          title: !input notification_title
          message: !input notification_message
          data:
            tag: "{{ tag_id }}"
            chronometer: true
            when: "{{ as_timestamp(now()) | int }}"
            timeout_after: !input timer_duration
            actions:
              - action: "{{ unique_action }}"
                title: !input action_button_label
              - action: "DISMISS"
                title: "Dismiss"

  # 2. Wait for ANY of the devices to respond
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ unique_action }}"
    timeout:
      seconds: "{{ timer_seconds }}"
    continue_on_timeout: true

  # 3. Decision Logic
  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
      # SECOND GATE: Check Action Conditions
      - condition: !input action_conditions
    then:
      - choose: []
        default: !input action_to_run

  # 4. Final Cleanup: Clear notifications from ALL selected devices
  - repeat:
      for_each: !input notify_devices
      sequence:
        - alias: "Clear Notification from Device"
          domain: mobile_app
          type: notify
          device_id: "{{ repeat.item }}"
          message: "clear_notification"
          data:
            tag: "{{ tag_id }}"
