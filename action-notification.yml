blueprint:
  name: Generic Actionable Zone Notification with Progress Bar
  description: Sends a notification with a progress bar and a live timer when entering a zone.
  domain: automation
  input:
    target_device:
      name: Device to notify
      selector:
        device:
          integration: mobile_app
    tracker_entity:
      name: Device Tracker
      selector:
        entity:
          domain: device_tracker
    zone_entity:
      name: Zone
      selector:
        entity:
          domain: zone
    notification_title:
      name: Notification Title
      default: "Proximity Alert"
      selector:
        text:
    notification_message:
      name: Notification Message
      default: "Action required. This prompt expires soon."
      selector:
        text:
    action_button_label:
      name: Button Label
      default: "Confirm Action"
      selector:
        text:
    action_to_run:
      name: Action
      selector:
        action: {}
    wait_time:
      name: Timeout (Seconds)
      default: 45
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds

mode: restart

variables:
  action_to_run: !input action_to_run
  # Dynamically discover the notification service for the selected device
  notify_service: "notify.mobile_app_{{ device_attr(target_device, 'name') | lower | replace(' ', '_') | replace('-', '_') }}"
  tag_id: "zone_action_with_progress"
  max_progress: !input wait_time

trigger:
  - platform: zone
    entity_id: !input tracker_entity
    zone: !input zone_entity
    event: enter

action:
  # 1. Send the Notification with Progress Bar and Chronometer
  - service: "{{ notify_service }}"
    data:
      title: !input notification_title
      message: !input notification_message
      data:
        tag: "{{ tag_id }}"
        # Android Specific Visuals
        chronometer: true # Shows a timer counting UP from 0
        when: "{{ as_timestamp(now()) | int }}" 
        progress: "{{ max_progress }}" # Shows a progress bar at "Full"
        max: "{{ max_progress }}"
        persistent: true # Prevents accidental swiping
        sticky: true
        actions:
          - action: "GENERIC_ACTION_TRIGGERED"
            title: !input action_button_label

  # 2. Wait for the button press or the timeout
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "GENERIC_ACTION_TRIGGERED"
    timeout:
      seconds: !input wait_time
    continue_on_timeout: true

  # 3. Decision Logic
  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
    then:
      # If button was pressed, run the user-defined action
      - choose: []
        default: !input action_to_run
    else:
      # If timed out, we stop here (notification will be cleared next)
      - stop: "User did not respond within the timeframe."

  # 4. Final Cleanup: Clear the notification from the phone's tray
  - service: "{{ notify_service }}"
    data:
      message: "clear_notification"
      data:
        tag: "{{ tag_id }}"
