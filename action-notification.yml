blueprint:
  name: Universal Pro Actionable Notification (Service-Group)
  description: "Triggers a notification to a specific notify service or group."
  domain: automation
  input:
    universal_trigger:
      name: Trigger(s)
      selector:
        trigger: {}
    notification_conditions:
      name: Notification Conditions
      description: "Filters that must be true to send the alert."
      default: []
      selector:
        condition: {}
    notify_service:
      name: Notify Service or Group
      description: "Enter the service name, e.g., 'notify.mobile_app_pixel_7' or your group name 'notify.family_phones'."
      selector:
        text:
    action_conditions:
      name: Action Conditions
      description: "Filters that must be true when you press the button."
      default: []
      selector:
        condition: {}
    notification_title:
      name: Title
      default: "Action Required"
      selector:
        text:
    notification_message:
      name: Message
      default: "This prompt will auto-dismiss after the timeout."
      selector:
        text:
    action_button_label:
      name: Button Label
      default: "Confirm Action"
      selector:
        text:
    timer_duration:
      name: Timer Duration (Seconds)
      default: 45
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds
    action_to_run:
      name: Action to perform
      selector:
        action: {}

mode: parallel
max: 10

variables:
  # Map inputs to variables for use in templates
  service_name: !input notify_service
  timer_seconds: !input timer_duration
  unique_action: "{{ 'PRO_ACTION_' ~ context.id }}"
  tag_id: "pro_universal_timer"

trigger: !input universal_trigger

condition: !input notification_conditions

action:
  # 1. Send the Notification
  - service: "{{ service_name }}"
    data:
      title: !input notification_title
      message: !input notification_message
      data:
        tag: "{{ tag_id }}"
        chronometer: true
        when: "{{ as_timestamp(now()) | int }}"
        timeout_after: !input timer_duration
        actions:
          - action: "{{ unique_action }}"
            title: !input action_button_label
          - action: "DISMISS"
            title: "Dismiss"

  # 2. Wait for the specific button press
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ unique_action }}"
    timeout:
      seconds: "{{ timer_seconds }}"
    continue_on_timeout: true

  # 3. Decision Logic & Action Conditions
  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
      - condition: !input action_conditions
    then:
      - choose: []
        default: !input action_to_run

  # 4. Final Cleanup
  - service: "{{ service_name }}"
    data:
      message: "clear_notification"
      data:
        tag: "{{ tag_id }}"
