blueprint:
  name: Universal Actionable Notification (Fixed)
  description: A robust, trigger-generic actionable notification blueprint.
  domain: automation
  input:
    trigger_condition:
      name: Trigger
      description: The event that starts the automation.
      selector:
        trigger: {}
    dynamic_conditions:
      name: Conditions
      default: []
      selector:
        condition: {}
    notify_device:
      name: Device to notify
      description: Select the mobile app device.
      selector:
        device:
          integration: mobile_app
    notification_title:
      name: Title
      default: "Proximity Alert"
      selector:
        text:
    notification_message:
      name: Message
      default: "Perform action?"
      selector:
        text:
    action_button_label:
      name: Button Label
      default: "Confirm"
      selector:
        text:
    action_to_run:
      name: Action to perform
      selector:
        action: {}
    wait_time:
      name: Timeout (Seconds)
      default: 45
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds

mode: restart

variables:
  # Map the inputs to variables for use in templates
  notify_service: "notify.mobile_app_{{ device_attr(notify_device, 'name') | lower | replace(' ', '_') | replace('-', '_') }}"
  action_key: "UNIVERSAL_CLICK"
  tag_id: "zone_request"
  title: !input notification_title
  message: !input notification_message
  button_label: !input action_button_label

trigger: !input trigger_condition

condition: !input dynamic_conditions

action:
  # 1. Send Notification
  - service: "{{ notify_service }}"
    data:
      title: "{{ title }}"
      message: "{{ message }}"
      data:
        tag: "{{ tag_id }}"
        chronometer: true
        when: "{{ as_timestamp(now()) | int }}"
        actions:
          - action: "{{ action_key }}"
            title: "{{ button_label }}"

  # 2. Wait for the click
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ action_key }}"
    timeout:
      seconds: !input wait_time
    continue_on_timeout: true

  # 3. If clicked, run the action
  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
    then:
      - choose: []
        default: !input action_to_run

  # 4. Cleanup
  - service: "{{ notify_service }}"
    data:
      message: "clear_notification"
      data:
        tag: "{{ tag_id }}"
