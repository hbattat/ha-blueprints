blueprint:
  name: Generic Actionable Zone Notification (Stable Version)
  description: Use this version if the previous one failed to trigger the action.
  domain: automation
  input:
    target_device:
      name: Device to notify
      selector:
        device:
          integration: mobile_app
    tracker_entity:
      name: Device Tracker
      selector:
        entity:
          domain: device_tracker
    zone_entity:
      name: Zone
      selector:
        entity:
          domain: zone
    action_to_run:
      name: Action
      selector:
        action: {}
    wait_time:
      name: Timeout (Seconds)
      default: 45
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds

mode: restart # This is important to handle GPS "flutter"

variables:
  # Create a unique action name for this specific automation instance
  # This prevents multiple automations from intercepting each other's clicks
  unique_action: "{{ 'GENERIC_ACTION_' ~ context.id }}"
  notify_service: "notify.mobile_app_{{ device_attr(target_device, 'name') | lower | replace(' ', '_') | replace('-', '_') }}"

trigger:
  - platform: zone
    entity_id: !input tracker_entity
    zone: !input zone_entity
    event: enter

action:
  - service: "{{ notify_service }}"
    data:
      title: "Proximity Alert"
      message: "Perform action?"
      data:
        tag: "zone_notification"
        chronometer: true
        when: "{{ as_timestamp(now()) | int }}"
        actions:
          - action: "{{ unique_action }}"
            title: "Confirm"

  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ unique_action }}"
    timeout:
      seconds: !input wait_time
    continue_on_timeout: true

  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
    then:
      - choose: []
        default: !input action_to_run

  - service: "{{ notify_service }}"
    data:
      message: "clear_notification"
      data:
        tag: "zone_notification"
