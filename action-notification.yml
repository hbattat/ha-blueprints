blueprint:
  name: Universal Pro Actionable Notification (Dropdown)
  description: "Advanced actionable notification with a device dropdown, visual timer, and dual-layer conditions."
  domain: automation
  input:
    universal_trigger:
      name: Trigger(s)
      description: "What starts the automation? (e.g., Zone Entry, NFC Tag, Time)."
      selector:
        trigger: {}
    notification_conditions:
      name: Notification Conditions
      description: "Must be true to SEND the alert (e.g., Garage is closed, Person is in Zone)."
      default: []
      selector:
        condition: {}
    notify_device:
      name: Device to Notify
      description: "Select your device from the list or type a notify group name."
      selector:
        entity:
          domain: notify
          # This gives you the dropdown but lets you type a group name manually
          multiple: false
    action_conditions:
      name: Action Conditions
      description: "Must be true to RUN the action (e.g., Safety check before opening door)."
      default: []
      selector:
        condition: {}
    notification_title:
      name: Title
      default: "Action Required"
      selector:
        text:
    notification_message:
      name: Message
      default: "This prompt will auto-dismiss after the timeout."
      selector:
        text:
    action_button_label:
      name: Button Label
      default: "Confirm Action"
      selector:
        text:
    timer_duration:
      name: Timer Duration (Seconds)
      default: 45
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds
    action_to_run:
      name: Action to perform
      selector:
        action: {}

mode: parallel
max: 10

variables:
  target_service: !input notify_device
  timer_seconds: !input timer_duration
  unique_action: "{{ 'PRO_ACTION_' ~ context.id }}"
  tag_id: "pro_universal_timer"

trigger: !input universal_trigger

condition: !input notification_conditions

action:
  # 1. Send the Notification
  - service: "{{ target_service }}"
    data:
      title: !input notification_title
      message: !input notification_message
      data:
        tag: "{{ tag_id }}"
        chronometer: true
        when: "{{ as_timestamp(now()) | int }}"
        timeout_after: !input timer_duration
        actions:
          - action: "{{ unique_action }}"
            title: !input action_button_label
          - action: "DISMISS"
            title: "Dismiss"

  # 2. Wait for the specific button press
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ unique_action }}"
    timeout:
      seconds: "{{ timer_seconds }}"
    continue_on_timeout: true

  # 3. Decision Logic & Final Conditions
  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
      - condition: !input action_conditions
    then:
      - choose: []
        default: !input action_to_run

  # 4. Final Cleanup
  - service: "{{ target_service }}"
    data:
      message: "clear_notification"
      data:
        tag: "{{ tag_id }}"
