blueprint:
  name: "Pro Universal Notify V2"
  description: "Actionable notification with dropdown selection and dual-layer conditions."
  domain: automation
  input:
    custom_trigger:
      name: Trigger(s)
      selector:
        trigger: {}
    pre_notify_conditions:
      name: Notification Conditions
      description: "Logic to check BEFORE sending the alert."
      default: []
      selector:
        condition: {}
    target_notify_service:
      name: Device to Notify
      description: "Select your phone's notify service from the list."
      selector:
        entity:
          domain: notify
          multiple: false
    post_click_conditions:
      name: Action Conditions
      description: "Logic to check AFTER the button is pressed but BEFORE the action runs."
      default: []
      selector:
        condition: {}
    notification_title:
      name: Title
      default: "Action Required"
      selector:
        text:
    notification_message:
      name: Message
      default: "This prompt will auto-dismiss after the timeout."
      selector:
        text:
    button_label:
      name: Button Label
      default: "Confirm"
      selector:
        text:
    timer_seconds_input:
      name: Timer Duration (Seconds)
      default: 45
      selector:
        number:
          min: 5
          max: 300
          unit_of_measurement: seconds
    final_action:
      name: Action to perform
      selector:
        action: {}

mode: parallel
max: 10

variables:
  service_to_call: !input target_notify_service
  wait_time: !input timer_seconds_input
  action_id: "{{ 'ACT_' ~ context.id }}"
  notification_tag: "universal_pro_tag"

trigger: !input custom_trigger

condition: !input pre_notify_conditions

action:
  # 1. Send the Notification
  - service: "{{ service_to_call }}"
    data:
      title: !input notification_title
      message: !input notification_message
      data:
        tag: "{{ notification_tag }}"
        chronometer: true
        when: "{{ as_timestamp(now()) | int }}"
        timeout_after: !input timer_seconds_input
        actions:
          - action: "{{ action_id }}"
            title: !input button_label
          - action: "DISMISS"
            title: "Dismiss"

  # 2. Wait for the click
  - wait_for_trigger:
      - platform: event
        event_type: mobile_app_notification_action
        event_data:
          action: "{{ action_id }}"
    timeout:
      seconds: "{{ wait_time }}"
    continue_on_timeout: true

  # 3. Decision Logic
  - if:
      - condition: template
        value_template: "{{ wait.trigger != none }}"
      - condition: !input post_click_conditions
    then:
      - choose: []
        default: !input final_action

  # 4. Cleanup
  - service: "{{ service_to_call }}"
    data:
      message: "clear_notification"
      data:
        tag: "{{ notification_tag }}"
